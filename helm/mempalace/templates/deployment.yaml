apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mempalace.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mempalace.labels" . | nindent 4 }}
spec:
  # Keep at 1 — mcp-proxy owns one MemPalace subprocess with an exclusive
  # ChromaDB connection.  See values.yaml for details.
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mempalace.selectorLabels" . | nindent 6 }}
  strategy:
    # Recreate prevents two pods mounting the same ReadWriteOnce PVC simultaneously.
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "mempalace.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mempalace.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: mempalace
          image: {{ include "mempalace.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "mempalace.fullname" . }}
          {{- with .Values.env.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "mempalace.dataPvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
