{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mempalace.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mempalace.labels" . | nindent 4 }}
  annotations:
    # Prevent Helm from replacing the token on upgrades when it was set externally.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  token: {{ required "auth.token is required when auth.enabled=true and auth.existingSecret is empty" .Values.auth.token | quote }}
{{- end }}
