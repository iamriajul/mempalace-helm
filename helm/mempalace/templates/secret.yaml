{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) -}}
{{- if not .Values.auth.token -}}
{{- fail "auth.token is required when auth.enabled=true and auth.existingSecret is not set" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mempalace.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mempalace.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.existingSecretKey | default "token" }}: {{ .Values.auth.token | quote }}
{{- end }}
