{{- /*
MemPalace (the MCP server) has no application-level authentication.
Auth is enforced at the network layer:
  - Inside the cluster: use NetworkPolicy to restrict which pods can reach the Service.
  - External access: use your Ingress controller's auth mechanism
    (e.g. nginx basic-auth, oauth2-proxy, or mTLS).

If you need to pass secrets to the MemPalace subprocess (e.g. future API keys),
add them via env.extraEnv using secretKeyRef entries in values.yaml.
*/ -}}
