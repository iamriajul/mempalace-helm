{{- if .Values.auth.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mempalace.fullname" . }}-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mempalace.labels" . | nindent 4 }}
data:
  Caddyfile: |
    {
        # Disable the Caddy admin API — not needed for a sidecar proxy.
        admin off
    }

    :8080 {
        # {env.MEMPALACE_AUTH_TOKEN} is substituted by Caddy at startup.
        @authed header Authorization "Bearer {env.MEMPALACE_AUTH_TOKEN}"

        handle @authed {
            reverse_proxy localhost:8081 {
                # Disable response buffering — required for SSE and Streamable HTTP.
                flush_interval -1
                header_up X-Real-IP        {remote_host}
                header_up X-Forwarded-For  {remote_host}
                header_up X-Forwarded-Proto {scheme}
            }
        }

        respond "Unauthorized" 401
    }
{{- end }}
