{{- if .Values.ingress.enabled -}}
{{- $cm := .Values.ingress.certManager -}}
{{- if and $cm.enabled (not (or $cm.clusterIssuer $cm.issuer)) -}}
{{- fail "ingress.certManager.enabled=true requires ingress.certManager.clusterIssuer or ingress.certManager.issuer" -}}
{{- end -}}
{{- $tlsSecretName := default (printf "%s-tls" (include "mempalace.fullname" .)) $cm.secretName -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mempalace.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mempalace.labels" . | nindent 4 }}
  {{- if or .Values.ingress.annotations $cm.enabled }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $cm.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $cm.clusterIssuer | quote }}
    {{- end }}
    {{- if $cm.issuer }}
    cert-manager.io/issuer: {{ $cm.issuer | quote }}
    {{- end }}
    {{- if $cm.issuerKind }}
    cert-manager.io/issuer-kind: {{ $cm.issuerKind | quote }}
    {{- end }}
    {{- if $cm.issuerGroup }}
    cert-manager.io/issuer-group: {{ $cm.issuerGroup | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if $cm.enabled }}
  tls:
    - secretName: {{ $tlsSecretName }}
      hosts:
        {{- range .Values.ingress.hosts }}
        - {{ .host | quote }}
        {{- end }}
  {{- else if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "mempalace.fullname" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
