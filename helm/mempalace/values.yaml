# Default values for mempalace.
# Override any of these in a custom values file or with --set.

# ── Architecture note ─────────────────────────────────────────────────────────
# MemPalace is a stdio-based MCP server (JSON-RPC over stdin/stdout).
# This chart wraps it with mcp-proxy, which exposes the stdio server over
# SSE/Streamable-HTTP so multiple AI agents can connect to a single pod.
#
# Agent connection URL:  http://<service>.<namespace>.svc.cluster.local/sse
# External (ingress):   https://mempalace.example.com/sse

# ── Replica count ─────────────────────────────────────────────────────────────
# Keep at 1.  mcp-proxy spawns exactly one MemPalace subprocess which holds
# an exclusive in-process ChromaDB connection.  Multiple replicas would each
# hold their own ChromaDB client against the same ReadWriteOnce PVC, risking
# index corruption.
replicaCount: 1

# ── Image ─────────────────────────────────────────────────────────────────────
image:
  repository: ghcr.io/iamriajul/mempalace
  # Defaults to the chart appVersion when left empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ── Name overrides ────────────────────────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

# ── Service account ───────────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  # Defaults to the fullname of the release when left empty.
  name: ""

# ── Pod metadata ──────────────────────────────────────────────────────────────
podAnnotations: {}
podLabels: {}

# ── Security contexts ─────────────────────────────────────────────────────────
podSecurityContext:
  # fsGroup=1000 ensures the PVC mounted at /data is writable by uid 1000 (mempalace).
  fsGroup: 1000
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  # ChromaDB writes its HNSW index and temp files at runtime; root FS must stay writable.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

# ── Ingress ───────────────────────────────────────────────────────────────────
# Enable to expose the SSE endpoint outside the cluster.
# Agents inside the cluster can reach it via the ClusterIP service directly.
# Auth is handled at this layer (e.g. nginx basic-auth or OAuth2 proxy) —
# MemPalace itself has no application-level authentication.
ingress:
  enabled: false
  className: ""
  annotations: {}
    # nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: mempalace.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # Manual TLS configuration. When ingress.certManager.enabled=true, the chart
  # renders a TLS stanza automatically and this list is ignored.
  # - secretName: mempalace-tls
  #   hosts:
  #     - mempalace.example.com
  certManager:
    enabled: false
    # Set one of clusterIssuer or issuer when enabled.
    clusterIssuer: ""
    issuer: ""
    issuerKind: ""
    issuerGroup: ""
    # Defaults to "<release fullname>-tls" when left empty.
    secretName: ""

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 512Mi   # ChromaDB HNSW index is in-memory; size grows with palace
  limits:
    cpu: 1000m
    memory: 2Gi

# ── Persistence ───────────────────────────────────────────────────────────────
# A single PVC is mounted at /data.  All palace state lives under it:
#   /data/palace/            — ChromaDB files + knowledge_graph.sqlite3 + palace YAML
#   /data/.mempalace/wal/    — write-ahead log (HOME=/data in the container)
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  size: 10Gi
  accessModes:
    - ReadWriteOnce

# ── Application configuration ─────────────────────────────────────────────────
config:
  # Directory passed to `mempalace.mcp_server --palace`.
  # ChromaDB, the knowledge graph, and palace YAML all live here.
  palacePath: /data/palace

# ── Authentication ────────────────────────────────────────────────────────────
# When enabled, an unprivileged NGINX sidecar is injected in front of
# mcp-proxy to enforce Bearer token authentication on all incoming requests.
# NGINX owns the named "http" port (8080); mcp-proxy shifts to an internal
# port (8081).
#
# Enable with a token:
#   helm install mempalace . \
#     --set auth.enabled=true \
#     --set auth.token=$(openssl rand -hex 32)
#
# Use a pre-existing Secret (e.g. sealed-secret):
#   helm install mempalace . \
#     --set auth.enabled=true \
#     --set auth.existingSecret=my-secret
auth:
  enabled: false
  # Bearer token value.  Required when enabled=true and existingSecret is unset.
  # Tip: openssl rand -hex 32
  token: ""
  # Name of a pre-existing Secret in the same namespace that holds the token.
  # When set, the chart will NOT create a Secret and auth.token is ignored.
  existingSecret: ""
  # Key inside the Secret (or the chart-managed Secret) that holds the token.
  existingSecretKey: "token"
  proxy:
    image:
      repository: nginxinc/nginx-unprivileged
      tag: "stable-alpine"
      pullPolicy: IfNotPresent
    # This sidecar only listens on 8080, so it can stay fully unprivileged.
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop:
          - ALL
    # Resources for the auth-proxy sidecar.
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

# ── Extra environment variables ───────────────────────────────────────────────
# Forwarded into the mcp-proxy process and passed through to the MemPalace
# subprocess via mcp-proxy's --pass-environment flag.
# Example:
#   extraEnv:
#     - name: MEMPALACE_LOG_LEVEL
#       value: debug
env:
  extraEnv: []

# ── Probes ────────────────────────────────────────────────────────────────────
# mcp-proxy does not expose an HTTP health endpoint; use a TCP socket check.
livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# ── Scheduling ────────────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}
