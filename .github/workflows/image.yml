name: Build & Push Container Image

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mempalace
          tags: |
            # latest tag on master
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            # branch name for pushes to master
            type=ref,event=branch
            # semver tags: v1.2.3 → 1.2.3 and 1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # short SHA for every build (always present)
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          # GitHub Actions cache via BuildKit cache API.
          # Uses the registry cache backend so cache layers are stored in GHCR
          # alongside the image – no extra storage needed.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mempalace:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/mempalace:buildcache,mode=max
