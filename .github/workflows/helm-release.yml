name: Helm Chart – Lint, Package & Publish

on:
  push:
    branches:
      - main
    paths:
      - "helm/**"
      - ".github/workflows/helm-release.yml"
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint-and-publish:
    name: Lint, package and push chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.4"

      - name: Lint chart
        run: helm lint helm/mempalace --strict

      - name: Determine chart version
        id: chart-version
        run: |
          VERSION=$(grep '^version:' helm/mempalace/Chart.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: |
          helm package helm/mempalace --destination /tmp/helm-packages

      - name: Log in to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Push chart to GHCR OCI registry
        run: |
          helm push \
            /tmp/helm-packages/mempalace-${{ steps.chart-version.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/helm-charts

      - name: Verify pushed chart (dry-run pull)
        run: |
          helm pull \
            oci://ghcr.io/${{ github.repository_owner }}/helm-charts/mempalace \
            --version ${{ steps.chart-version.outputs.version }} \
            --destination /tmp/verify
          echo "Chart verified:"
          ls -lh /tmp/verify/
